<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Team Colors</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; }
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        
        .player-side { 
            border: 2px solid #444; padding: 15px; border-radius: 12px; 
            width: 420px; min-height: 380px; background: #1e1e1e; position: relative;
        }
        /* Player 1 Active Glow (Blue) */
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }
        /* Player 2 Active Glow (Green) */
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        
        .die-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; transition: 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            padding: 10px; border-radius: 12px; border: 3px solid transparent; 
        }
        
        .die-img { 
            width: 75px; height: 75px; object-fit: contain; margin-bottom: 5px; 
            filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.6)); 
            transition: transform 0.2s;
        }

        .die-wrapper:hover .die-img { transform: scale(1.15); }
        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); transform: translateY(-8px); }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }

        .die-val { font-size: 1.8em; font-weight: bold; color: white; text-shadow: 2px 2px 4px black; }

        .controls { margin-top: 30px; padding: 25px; background: #222; border-radius: 15px; display: inline-block; border: 1px solid #333; }
        input { background: #333; border: 1px solid #555; color: #0f0; padding: 12px; font-size: 1.2em; width: 280px; border-radius: 8px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; }
        .btn-atk { background: #e67e22; color: white; border-bottom: 4px solid #d35400; }
        .btn-pass { background: #7f8c8d; color: white; }
        .chip { color: #e74c3c; font-size: 28px; position: absolute; top: 15px; right: 15px; }
    </style>

    <script>
        // --- SEPARATE IMAGE SETS ---
        // Player 1 Images (Blue set)
        const P1_IMGS = {
            4:  "d4_blue.png", 
            6:  "d6_blue.png",  
            8:  "d8_blue.png",  
            10: "d10_blue.png",  
            12: "d12_blue.png",  
            20: "d20_blue.png"   
        };

        // Player 2 Images (Green set)
        const P2_IMGS = {
            4:  "d4_green.png", 
            6:  "d6_green.png",  
            8:  "d8_green.png",  
            10: "d10_green.png",  
            12: "d12_green.png",  
            20: "d20_green.png"   
        };

        let p1 = { dice: [], penalty: false };
        let p2 = { dice: [], penalty: false };
        let turn = 1;
        let selectedOwn = []; 
        let selectedOpp = null;

        function initGame() {
            const sides = [4, 6, 8, 10, 12, 20];
            const roll = (s) => Math.floor(Math.random() * s) + 1;
            p1.dice = sides.map(s => ({ s, v: roll(s) }));
            p2.dice = sides.map(s => ({ s, v: roll(s) }));

            const sorter = (a, b) => a.v === b.v ? a.s - b.s : a.v - b.v;
            p1.dice.sort(sorter); p2.dice.sort(sorter);

            let decided = false;
            for(let i=0; i<6; i++) {
                if(p1.dice[i].v < p2.dice[i].v) { p1.penalty = true; turn = 1; decided = true; break; }
                if(p2.dice[i].v < p1.dice[i].v) { p2.penalty = true; turn = 2; decided = true; break; }
            }
            if(!decided) { p1.penalty = true; turn = 1; }

            document.getElementById('setup').style.display = 'none';
            document.getElementById('main-game').style.display = 'block';
            render();
        }

        function render() {
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            document.getElementById('p1-penalty').innerText = p1.penalty ? "🔴" : "";
            document.getElementById('p2-penalty').innerText = p2.penalty ? "🔴" : "";
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            document.getElementById('msg').innerText = "Player " + turn + "'s Turn";
        }

        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            
            // Choose the correct image set based on the owner
            const imgSet = (owner === 1) ? P1_IMGS : P2_IMGS;

            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                if(owner === turn && selectedOwn.includes(i)) wrapper.classList.add('selected');
                if(owner !== turn && selectedOpp === i) wrapper.classList.add('target');
                
                wrapper.innerHTML = `
                    <img src="${imgSet[d.s]}" class="die-img">
                    <div class="die-val">${d.v}</div>
                `;
                
                wrapper.onclick = () => {
                    if(owner === turn) {
                        if(selectedOwn.includes(i)) selectedOwn = selectedOwn.filter(x => x !== i);
                        else selectedOwn.push(i);
                    } else { selectedOpp = i; }
                    render();
                };
                container.appendChild(wrapper);
            });
        }

        function doStrength() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return alert("Select 1 die and 1 target!");
            let atk = (turn === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (turn === 1 ? p2 : p1).dice[selectedOpp];
            if(atk.v >= def.v) executeCapture();
            else alert("Strength too low!");
        }

        function doMind() {
            if(selectedOwn.length < 2 || selectedOpp === null) return alert("Select 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            const attacker = turn === 1 ? p1 : p2;
            const defender = turn === 1 ? p2 : p1;
            const targetVal = defender.dice[selectedOpp].v;

            let allowedValues = selectedOwn.map(idx => attacker.dice[idx].v);
            let formulaNumbers = formula.match(/\d+/g);
            if (!formulaNumbers) return alert("Enter math!");
            let formulaVals = formulaNumbers.map(Number);

            if (formulaVals.length !== allowedValues.length) return alert("Use all selected dice!");

            let tempAllowed = [...allowedValues];
            let isValidSelection = true;
            for (let val of formulaVals) {
                let index = tempAllowed.indexOf(val);
                if (index !== -1) tempAllowed.splice(index, 1);
                else { isValidSelection = false; break; }
            }

            if (!isValidSelection) return alert("Numbers don't match selected dice!");

            try {
                if (/[^0-9+\-*/().]/.test(formula)) throw "Invalid";
                if(eval(formula) === targetVal) executeCapture();
                else alert("Result doesn't match target!");
            } catch(e) { alert("Invalid Format!"); }
        }

        function executeCapture() {
            let atk = turn === 1 ? p1 : p2;
            let def = turn === 1 ? p2 : p1;
            def.dice.splice(selectedOpp, 1);
            selectedOwn.forEach(idx => {
                atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1;
            });
            const sorter = (a, b) => a.v === b.v ? a.s - b.s : a.v - b.v;
            atk.dice.sort(sorter);
            if(def.dice.length === 0) {
                alert("GAME OVER! Player " + turn + " Wins!");
                location.reload();
            } else if (p1.dice.length === 1 && p2.dice.length === 1 && p1.dice[0].v === p2.dice[0].v) {
                let winner = p1.penalty ? "Player 2" : "Player 1";
                alert("SUDDEN DEATH! Winner: " + winner);
                location.reload();
            } else { nextTurn(); }
        }

        function nextTurn() {
            turn = turn === 1 ? 2 : 1;
            selectedOwn = []; selectedOpp = null;
            document.getElementById('formula').value = '';
            render();
        }
    </script>
</head>
<body>
    <h1>MATHS WARRIORS</h1>
    <div id="setup"><button onclick="initGame()" class="btn-atk" style="background:#27ae60;font-size:24px;">START GAME</button></div>
    <div id="main-game" style="display:none;">
        <h2 id="msg"></h2>
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 style="color:#3498db;">PLAYER 1 <span id="p1-penalty" class="chip"></span></h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 style="color:#27ae60;">PLAYER 2 <span id="p2-penalty" class="chip"></span></h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>
        <div class="controls">
            <input type="text" id="formula" placeholder="e.g. 5+2">
            <button class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button class="btn-pass" onclick="nextTurn()">Pass Turn</button>
        </div>
    </div>
</body>
</html>
