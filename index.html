<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Animated</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 20px; overflow-x: hidden; }
        
        /* Message Area */
        #msg-display { font-size: 1.5em; height: 40px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; }

        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { 
            border: 2px solid #444; padding: 15px; border-radius: 12px; 
            width: 420px; min-height: 380px; background: #1e1e1e; position: relative;
        }
        
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        
        .die-wrapper { 
            display: flex; flex-direction: column; align-items: center; 
            cursor: pointer; transition: 0.3s; 
            padding: 10px; border-radius: 12px; border: 3px solid transparent; 
        }
        
        .die-img { 
            width: 75px; height: 75px; object-fit: contain; margin-bottom: 5px; 
            filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.8)); 
        }

        /* --- ANIMATIONS --- */
        
        /* Capture: Die falls down and fades out */
        .captured {
            animation: die-fall 0.6s forwards;
            pointer-events: none;
        }
        @keyframes die-fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(200px) rotate(45deg); opacity: 0; }
        }

        /* Rolling: Die shakes and spins */
        .rolling {
            animation: die-roll 0.4s infinite;
        }
        @keyframes die-roll {
            0% { transform: rotate(0deg); }
            25% { transform: rotate(10deg) scale(1.1); }
            75% { transform: rotate(-10deg) scale(0.9); }
            100% { transform: rotate(0deg); }
        }

        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); transform: translateY(-8px); }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .die-val { font-size: 1.8em; font-weight: bold; text-shadow: 2px 2px 4px black; }

        .controls { margin-top: 30px; padding: 25px; background: #222; border-radius: 15px; display: inline-block; }
        input { background: #333; border: 1px solid #555; color: #0f0; padding: 12px; font-size: 1.2em; width: 280px; border-radius: 8px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; transition: 0.2s; }
        .btn-atk { background: #e67e22; color: white; border-bottom: 4px solid #d35400; }
        .btn-atk:hover { background: #ff9f43; }
        .btn-pass { background: #7f8c8d; color: white; }
    </style>
</head>
<body>

    <h1>MATHS WARRIORS</h1>
    <div id="msg-display">Welcome! Roll to start.</div>

    <div id="setup">
        <button onclick="initGame()" class="btn-atk" style="background:#27ae60; padding: 20px 40px;">START GAME</button>
    </div>

    <div id="main-game" style="display:none;">
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 style="color:#3498db;">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 style="color:#27ae60;">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="formula" placeholder="e.g. 5+2">
            <button class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button class="btn-pass" onclick="nextTurn()">Pass Turn</button>
        </div>
    </div>

    <script>
        // Update these to your actual file names!
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };

        let p1 = { dice: [], penalty: false };
        let p2 = { dice: [], penalty: false };
        let turn = 1;
        let selectedOwn = []; 
        let selectedOpp = null;

        function setStatus(txt) { document.getElementById('msg-display').innerText = txt; }

        function initGame() {
            const sides = [4, 6, 8, 10, 12, 20];
            const roll = (s) => Math.floor(Math.random() * s) + 1;
            p1.dice = sides.map(s => ({ s, v: roll(s) }));
            p2.dice = sides.map(s => ({ s, v: roll(s) }));
            p1.dice.sort((a,b)=>a.v-b.v); p2.dice.sort((a,b)=>a.v-b.v);
            
            // Logic for turn/penalty (simplified for demo)
            turn = 1;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('main-game').style.display = 'block';
            setStatus("Game Started! Player 1's Turn");
            render();
        }

        function render() {
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
        }

        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            const imgSet = (owner === 1) ? P1_IMGS : P2_IMGS;

            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === turn && selectedOwn.includes(i)) wrapper.classList.add('selected');
                if(owner !== turn && selectedOpp === i) wrapper.classList.add('target');
                
                wrapper.innerHTML = `<img src="${imgSet[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(owner === turn) {
                        if(selectedOwn.includes(i)) selectedOwn = selectedOwn.filter(x => x !== i);
                        else selectedOwn.push(i);
                    } else { selectedOpp = i; }
                    render();
                };
                container.appendChild(wrapper);
            });
        }

        function doStrength() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die and 1 target!");
            let atk = (turn === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (turn === 1 ? p2 : p1).dice[selectedOpp];
            if(atk.v >= def.v) executeCapture();
            else setStatus("Strength too low!");
        }

        function doMind() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            const attacker = turn === 1 ? p1 : p2;
            const defender = turn === 1 ? p2 : p1;
            const targetVal = defender.dice[selectedOpp].v;
            try {
                if(eval(formula) === targetVal) executeCapture();
                else setStatus("Math doesn't match!");
            } catch(e) { setStatus("Invalid Formula!"); }
        }

        function executeCapture() {
            setStatus("CAPTURE SUCCESSFUL!");
            const defSide = (turn === 1 ? 2 : 1);
            const targetEl = document.getElementById(`die-${defSide}-${selectedOpp}`);
            
            // Add Falling Animation to captured die
            targetEl.classList.add('captured');

            // Add Rolling Animation to attacking dice
            selectedOwn.forEach(idx => {
                document.getElementById(`die-${turn}-${idx}`).classList.add('rolling');
            });

            setTimeout(() => {
                let atk = turn === 1 ? p1 : p2;
                let def = turn === 1 ? p2 : p1;
                def.dice.splice(selectedOpp, 1);
                selectedOwn.forEach(idx => {
                    atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1;
                });
                atk.dice.sort((a,b)=>a.v-b.v);
                if(def.dice.length === 0) {
                    setStatus("GAME OVER! Player " + turn + " Wins!");
                } else {
                    nextTurn();
                }
            }, 700);
        }

        function nextTurn() {
            turn = turn === 1 ? 2 : 1;
            selectedOwn = []; selectedOpp = null;
            document.getElementById('formula').value = '';
            setStatus("Player " + turn + "'s Turn");
            render();
        }
    </script>
</body>
</html>
