<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Online Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        /* Base Styles */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%;
            background: #000; color: white; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            overflow-x: hidden;
        }

        /* The Letter Glitch Background Container */
        #glitch-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1; /* Behind everything */
            background-color: #000;
        }

        /* Overlay to make text readable over the glitch */
        #ui-layer {
            position: relative;
            z-index: 1;
            padding: 20px;
            min-height: 100vh;
            text-align: center;
            background: radial-gradient(circle, rgba(0,0,0,0.2) 0%, rgba(0,0,0,0.7) 100%);
        }

        #msg-display { font-size: 1.5em; height: 40px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; text-shadow: 0 0 10px black; }

        /* Lobby & Boxes */
        #lobby { 
            padding: 40px; background: rgba(20, 20, 25, 0.9); 
            border: 1px solid #444; border-radius: 20px; 
            display: inline-block; margin-top: 50px; 
            backdrop-filter: blur(10px);
        }
        .room-input { background: #111; border: 1px solid #00d4ff; color: #0f0; padding: 12px; font-size: 1.2em; width: 250px; border-radius: 8px; margin-bottom: 20px; outline: none; }

        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { 
            border: 2px solid rgba(255,255,255,0.1); padding: 15px; border-radius: 12px; 
            width: 420px; min-height: 380px; background: rgba(0,0,0,0.6); 
            backdrop-filter: blur(5px); position: relative; transition: 0.4s;
        }
        
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px #3498db; }
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px #27ae60; }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 12px; border: 3px solid transparent; }
        .die-img { width: 75px; height: 75px; object-fit: contain; filter: drop-shadow(0px 4px 4px black); }

        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        @keyframes die-fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }

        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.2); transform: translateY(-5px); }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .die-val { font-size: 1.8em; font-weight: bold; text-shadow: 2px 2px 4px black; }

        .controls { margin-top: 30px; padding: 25px; background: rgba(0,0,0,0.8); border-radius: 15px; display: inline-block; border: 1px solid #333; }
        input[type="text"] { background: #000; border: 1px solid #555; color: #0f0; padding: 10px; font-size: 1.1em; border-radius: 5px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-atk { background: #e67e22; color: white; }
        .btn-pass { background: #555; color: white; }
        .hidden { display: none !important; }

        #game-over-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 100;
        }
        .win-msg { font-size: 5em; font-weight: bold; color: #f1c40f; text-shadow: 0 0 20px #f1c40f; }
        .lose-msg { font-size: 5em; font-weight: bold; color: #e74c3c; text-shadow: 0 0 20px #e74c3c; }
    </style>
</head>
<body>

    <div id="glitch-container">
        <canvas id="glitch-canvas"></canvas>
    </div>

    <div id="ui-layer">
        <h1 style="letter-spacing: 4px; text-shadow: 0 0 10px #00d4ff;">MATHS WARRIORS ONLINE</h1>
        <div id="msg-display">Initialize Connection...</div>

        <div id="lobby">
            <input type="text" id="room-input" class="room-input" placeholder="Enter Room ID..."><br>
            <button class="btn-atk" onclick="joinRoom(1)" style="background:#3498db;">Host P1</button>
            <button class="btn-atk" onclick="joinRoom(2)" style="background:#27ae60;">Join P2</button>
        </div>

        <div id="waiting-screen" class="hidden">
            <h2 style="color:#00d4ff; animation: pulse 1.5s infinite;">WAITING FOR OPPONENT...</h2>
        </div>

        <div id="main-game" class="hidden">
            <div class="board">
                <div id="p1-area" class="player-side">
                    <h3 style="color:#3498db;">PLAYER 1</h3>
                    <div id="p1-dice" class="dice-grid"></div>
                </div>
                <div id="p2-area" class="player-side">
                    <h3 style="color:#27ae60;">PLAYER 2</h3>
                    <div id="p2-dice" class="dice-grid"></div>
                </div>
            </div>

            <div class="controls">
                <input type="text" id="formula" placeholder="Math formula...">
                <button id="mind-btn" class="btn-atk" onclick="doMind()">Mind Strike</button>
                <button id="strength-btn" class="btn-atk" onclick="doStrength()">Strength Strike</button>
                <button id="pass-btn" class="btn-pass" onclick="nextTurn()">End Turn</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";

        // --- LETTER GLITCH ENGINE (Translated from React Bits) ---
        class GlitchBackground {
            constructor(canvasId) {
                this.canvas = document.getElementById(canvasId);
                this.ctx = this.canvas.getContext('2d');
                this.glitchColors = ['#1a2a22', '#3498db', '#27ae60']; // Theme matching colors
                this.glitchSpeed = 60;
                this.charWidth = 10;
                this.charHeight = 20;
                this.letters = [];
                this.characters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ!@#$&*()0123456789';
                this.lastUpdate = Date.now();
                
                window.addEventListener('resize', () => this.resize());
                this.resize();
                this.animate();
            }

            resize() {
                this.canvas.width = window.innerWidth;
                this.canvas.height = window.innerHeight;
                this.columns = Math.ceil(this.canvas.width / this.charWidth);
                this.rows = Math.ceil(this.canvas.height / this.charHeight);
                this.initializeLetters();
            }

            initializeLetters() {
                this.letters = Array.from({ length: this.columns * this.rows }, () => ({
                    char: this.characters[Math.floor(Math.random() * this.characters.length)],
                    color: this.glitchColors[Math.floor(Math.random() * this.glitchColors.length)]
                }));
            }

            draw() {
                this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
                this.ctx.font = '14px monospace';
                this.ctx.textBaseline = 'top';

                this.letters.forEach((l, i) => {
                    const x = (i % this.columns) * this.charWidth;
                    const y = Math.floor(i / this.columns) * this.charHeight;
                    this.ctx.fillStyle = l.color;
                    this.ctx.fillText(l.char, x, y);
                });
            }

            update() {
                const changeCount = Math.floor(this.letters.length * 0.03);
                for (let i = 0; i < changeCount; i++) {
                    const idx = Math.floor(Math.random() * this.letters.length);
                    this.letters[idx].char = this.characters[Math.floor(Math.random() * this.characters.length)];
                    this.letters[idx].color = this.glitchColors[Math.floor(Math.random() * this.glitchColors.length)];
                }
            }

            animate() {
                const now = Date.now();
                if (now - this.lastUpdate > this.glitchSpeed) {
                    this.update();
                    this.draw();
                    this.lastUpdate = now;
                }
                requestAnimationFrame(() => this.animate());
            }
        }

        // Initialize Background
        new GlitchBackground('glitch-canvas');

        // --- FIREBASE GAME LOGIC ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
    
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
    
        let p1 = { dice: [] }, p2 = { dice: [] }, turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
        let selectedOwn = [], selectedOpp = null;
    
        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;
    
        window.joinRoom = function(pNum) {
            const rName = document.getElementById('room-input').value;
            if(!rName) return alert("Enter Room ID!");
            myPlayerNum = pNum;
            currentRoomName = rName;
            const roomPath = ref(db, 'rooms/' + rName);
    
            if(myPlayerNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                set(roomPath, {
                    p1Dice: sides.map(s => ({ s, v: roll(s) })),
                    p2Dice: sides.map(s => ({ s, v: roll(s) })),
                    turn: 1, lastCap: null, winner: null, count: 1
                });
            } else {
                update(roomPath, { count: 2 });
            }
    
            onValue(roomPath, (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.winner) return showGameOver(data.winner);

                if (!data.count || data.count < 2) {
                    document.getElementById('waiting-screen').classList.remove('hidden');
                    document.getElementById('main-game').classList.add('hidden');
                } else {
                    document.getElementById('waiting-screen').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    if(data.lastCap && data.lastCap.by !== myPlayerNum && !isAnimating) {
                        showEnemyCaptureAnim(data.lastCap.targetIdx);
                    }
                    p1.dice = data.p1Dice || [];
                    p2.dice = data.p2Dice || [];
                    turn = data.turn;
                    if(!isAnimating) render();
                }
            });
            document.getElementById('lobby').classList.add('hidden');
        };
    
        function showGameOver(winnerId) {
            const isWin = winnerId === myPlayerNum;
            const overlay = document.createElement('div');
            overlay.id = 'game-over-overlay';
            overlay.innerHTML = `<h1 class="${isWin ? 'win-msg' : 'lose-msg'}">${isWin ? 'VICTORY' : 'DEFEAT'}</h1><button onclick="location.reload()">Return</button>`;
            document.body.appendChild(overlay);
        }
    
        window.executeCapture = function() {
            isAnimating = true;
            setStatus("CAPTURE SUCCESS!");
            const defSide = (myPlayerNum === 1 ? 2 : 1);
            const target = document.getElementById(`die-${defSide}-${selectedOpp}`);
            if(target) target.classList.add('captured');
    
            setTimeout(() => {
                let atk = (myPlayerNum === 1 ? p1 : p2);
                let def = (myPlayerNum === 1 ? p2 : p1);
                def.dice.splice(selectedOpp, 1);
                if(def.dice.length === 0) {
                    update(ref(db, 'rooms/' + currentRoomName), { winner: myPlayerNum });
                    return;
                }
                selectedOwn.forEach(idx => {
                    atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1;
                });
                update(ref(db, 'rooms/' + currentRoomName), {
                    p1Dice: p1.dice, p2Dice: p2.dice,
                    turn: (myPlayerNum === 1 ? 2 : 1),
                    lastCap: { by: myPlayerNum, targetIdx: selectedOpp }
                });
                selectedOwn = []; selectedOpp = null;
                isAnimating = false;
                render();
            }, 700);
        }
    
        function render() {
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            const isMyTurn = (turn === myPlayerNum);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            setStatus(isMyTurn ? "YOUR TURN!" : "Opponent is thinking...");
            document.getElementById('mind-btn').disabled = !isMyTurn;
            document.getElementById('strength-btn').disabled = !isMyTurn;
            document.getElementById('pass-btn').disabled = !isMyTurn;
        }
    
        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            const imgSet = (owner === 1) ? P1_IMGS : P2_IMGS;
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add('selected');
                if(owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add('target');
                wrapper.innerHTML = `<img src="${imgSet[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(turn !== myPlayerNum) return;
                    if(owner === myPlayerNum) {
                        if(selectedOwn.includes(i)) selectedOwn = selectedOwn.filter(x => x !== i);
                        else selectedOwn.push(i);
                    } else {
                        selectedOpp = i;
                    }
                    render();
                };
                container.appendChild(wrapper);
            });
        }
    
        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die and 1 target!");
            let atk = (myPlayerNum === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2 : p1).dice[selectedOpp];
            if(atk.v >= def.v) executeCapture();
            else setStatus("Strength too low!");
        };
    
        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            const defender = (myPlayerNum === 1 ? p2 : p1);
            try {
                if(eval(formula) === defender.dice[selectedOpp].v) executeCapture();
                else setStatus("Math failed!");
            } catch(e) { setStatus("Invalid Formula!"); }
        };
    
        function showEnemyCaptureAnim(idx) {
            isAnimating = true;
            const target = document.getElementById(`die-${myPlayerNum}-${idx}`);
            if(target) target.classList.add('captured');
            setTimeout(() => { isAnimating = false; render(); }, 700);
        }
    
        window.nextTurn = function() {
            if(turn !== myPlayerNum) return;
            update(ref(db, 'rooms/' + currentRoomName), { turn: (myPlayerNum === 1 ? 2 : 1), lastCap: null });
        };
    </script>
</body>
</html>
