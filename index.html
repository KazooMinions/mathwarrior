<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Online Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            text-align: center;
            overflow-x: hidden;
            color: white;
            background: linear-gradient(315deg, rgba(101,0,94,1) 3%, rgba(60,132,206,1) 38%, rgba(48,238,226,1) 68%, rgba(255,25,25,1) 98%);
            background-size: 400% 400%;
            background-attachment: fixed;
            animation: gradient 30s ease infinite;
        }
        
        @keyframes gradient {
            0% { background-position: 0% 0%; }
            50% { background-position: 100% 100%; }
            100% { background-position: 0% 0%; }
        }
        
        .wave {
            background: rgb(255 255 255 / 15%);
            border-radius: 1000% 1000% 0 0;
            position: fixed;
            width: 200%;
            height: 12em;
            animation: wave 20s -3s linear infinite;
            transform: translate3d(0, 0, 0);
            opacity: 0.8;
            bottom: 0;
            left: 0;
            z-index: -1;
            filter: blur(8px); 
        }

        #msg-display { font-size: 1.5em; height: 40px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        
        /* Battle Log Styling */
        #battle-log { 
            background: rgba(0,0,0,0.6); 
            border: 1px solid #f1c40f; 
            border-radius: 10px; 
            padding: 10px; 
            margin: 10px auto; 
            width: 80%; 
            max-width: 600px; 
            font-family: monospace; 
            color: #0f0; 
            min-height: 20px;
        }

        #lobby-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        #lobby { padding: 30px; background: rgba(30, 30, 30, 0.9); border: 2px solid #444; border-radius: 20px; width: 350px; }
        .browser-box { width: 400px; background: rgba(20, 20, 20, 0.8); border: 1px solid #555; border-radius: 15px; padding: 15px; max-height: 300px; overflow-y: auto; }
        
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { border: 2px solid #444; padding: 15px; border-radius: 12px; width: 420px; min-height: 380px; background: rgba(30,30,30,0.8); transition: 0.4s; }
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 12px; border: 3px solid transparent; position: relative; }
        .die-img { width: 75px; height: 75px; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.8)); }
        
        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); transform: translateY(-8px); }
        .die-wrapper.enemy-selected { border-color: rgba(255, 255, 255, 0.4); border-style: dashed; }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }

        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        @keyframes die-fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }

        .controls { margin-top: 20px; padding: 20px; background: rgba(34,34,34,0.9); border-radius: 15px; display: inline-block; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; border: none; margin: 5px; }
        .btn-atk { background: #e67e22; color: white; }
        .btn-pass { background: #7f8c8d; color: white; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div class="wave"></div>
    <h1>MATHS WARRIORS ONLINE</h1>
    <div id="msg-display">Welcome!</div>
    <div id="battle-log">Waiting for first move...</div>

    <div id="lobby-container">
        <div id="lobby">
            <input type="text" id="room-input" style="padding:10px; border-radius:5px; border:none;" placeholder="Room Name..."><br><br>
            <button class="btn-atk" onclick="joinRoom(1)" style="background:#3498db; width:100%;">Create New Room</button>
        </div>
        <div class="browser-box">
            <h3 style="margin-top:0; color:#00d4ff;">ACTIVE LOBBIES</h3>
            <div id="room-list"></div>
        </div>
    </div>

    <div id="main-game" class="hidden">
        <div id="room-tag">ROOM: <span id="room-id-display"></span></div>
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 style="color:#3498db;">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 style="color:#27ae60;">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>
        <div class="controls">
            <input type="text" id="formula" style="background:#333; color:#0f0; border:1px solid #555; padding:10px; border-radius:5px;" placeholder="e.g. 5+2">
            <button id="mind-btn" class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button id="strength-btn" class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button id="pass-btn" class="btn-pass" onclick="nextTurn()">Pass Turn</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
    
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
    
        let p1 = { dice: [] }, p2 = { dice: [] }, turn = 1, myPlayerNum = 0, currentRoomName = "";
        let selectedOwn = [], selectedOpp = null, enemySelections = [], enemyTarget = null;
    
        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;
        const setLog = (txt) => document.getElementById('battle-log').innerText = txt;

        // SYNC SELECTIONS (Both own dice and targeted enemy die)
        window.syncSelection = function() {
            if(!currentRoomName) return;
            const roomRef = ref(db, 'rooms/' + currentRoomName);
            if(myPlayerNum === 1) update(roomRef, { p1Selected: selectedOwn, p1Target: selectedOpp });
            else update(roomRef, { p2Selected: selectedOwn, p2Target: selectedOpp });
        };

        // LOBBY LISTENER
        onValue(ref(db, 'rooms'), (snapshot) => {
            const rooms = snapshot.val();
            const listDiv = document.getElementById('room-list');
            listDiv.innerHTML = '';
            if (!rooms) return;
            Object.keys(rooms).forEach(key => {
                const r = rooms[key];
                if (!r.winner && r.count < 2) {
                    const item = document.createElement('div');
                    item.innerHTML = `<button onclick="window.joinRoom(2, '${key}')" style="width:100%; margin-bottom:5px;">Join ${key}</button>`;
                    listDiv.appendChild(item);
                }
            });
        });
    
        window.joinRoom = async function(pNum, manualRoom = null) {
            const rName = manualRoom || document.getElementById('room-input').value.trim();
            if(!rName) return;
            myPlayerNum = pNum;
            currentRoomName = rName;
            document.getElementById('room-id-display').innerText = rName;
            const roomRef = ref(db, 'rooms/' + rName);

            if(pNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                set(roomRef, {
                    p1Dice: sides.map(s => ({ s, v: roll(s) })),
                    p2Dice: sides.map(s => ({ s, v: roll(s) })),
                    turn: 1, count: 1, p1Selected: [], p2Selected: [], p1Target: null, p2Target: null, log: "Game Started!"
                });
            } else {
                update(roomRef, { count: 2 });
            }
    
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(!data || data.winner) return data?.winner && showGameOver(data.winner);
                if(data.count >= 2) {
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    
                    // Sync Enemy Selection + Targeting
                    enemySelections = (myPlayerNum === 1) ? (data.p2Selected || []) : (data.p1Selected || []);
                    enemyTarget = (myPlayerNum === 1) ? data.p2Target : data.p1Target;
                    
                    p1.dice = data.p1Dice || []; p2.dice = data.p2Dice || [];
                    turn = data.turn;
                    setLog(data.log || "");
                    render();
                }
            });
        };
    
        function render() {
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            const isMyTurn = (turn === myPlayerNum);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            setStatus(isMyTurn ? "YOUR TURN!" : "ENEMY IS CHOOSING...");
        }

        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                
                // Highlight Logic
                if(owner === myPlayerNum) {
                    if(selectedOwn.includes(i)) wrapper.classList.add('selected'); // Your selection
                    if(enemyTarget === i) wrapper.classList.add('target'); // Enemy targeting YOU
                } else {
                    if(selectedOpp === i) wrapper.classList.add('target'); // You targeting enemy
                    if(enemySelections.includes(i)) wrapper.classList.add('enemy-selected'); // Enemy selection
                }

                wrapper.innerHTML = `<img src="${(owner===1?P1_IMGS:P2_IMGS)[d.s]}" class="die-img"><div style="font-weight:bold; font-size:1.5em;">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(turn !== myPlayerNum) return;
                    if(owner === myPlayerNum) {
                        selectedOwn = selectedOwn.includes(i) ? selectedOwn.filter(x => x !== i) : [...selectedOwn, i];
                    } else {
                        selectedOpp = (selectedOpp === i) ? null : i;
                    }
                    window.syncSelection();
                    render();
                };
                container.appendChild(wrapper);
            });
        }

        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Pick 1 die and 1 target!");
            let atk = (myPlayerNum === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2 : p1).dice[selectedOpp];
            const logMsg = `Player ${myPlayerNum} Strength Attack! ${atk.v} ≥ ${def.v}`;
            if(atk.v >= def.v) executeCapture(logMsg); else setStatus("Strength too low!");
        };

        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Pick 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            const defValue = (myPlayerNum === 1 ? p2 : p1).dice[selectedOpp].v;
            try {
                if(eval(formula) === defValue) {
                    executeCapture(`Player ${myPlayerNum} Mind Attack! ${formula} = ${defValue}`);
                } else setStatus("Math doesn't match!");
            } catch(e) { setStatus("Invalid Formula!"); }
        };

        window.executeCapture = function(logMessage) {
            let atk = (myPlayerNum === 1 ? p1 : p2);
            let def = (myPlayerNum === 1 ? p2 : p1);
            def.dice.splice(selectedOpp, 1);
            
            if(def.dice.length === 0) return update(ref(db, 'rooms/' + currentRoomName), { winner: myPlayerNum, log: logMessage });
            
            selectedOwn.forEach(idx => { atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1; });
            
            update(ref(db, 'rooms/' + currentRoomName), {
                p1Dice: p1.dice, p2Dice: p2.dice,
                turn: (myPlayerNum === 1 ? 2 : 1),
                p1Selected: [], p2Selected: [], p1Target: null, p2Target: null,
                log: logMessage
            });
            selectedOwn = []; selectedOpp = null;
        }

        window.nextTurn = function() {
            update(ref(db, 'rooms/' + currentRoomName), { 
                turn: (myPlayerNum === 1 ? 2 : 1), 
                p1Selected: [], p2Selected: [], p1Target: null, p2Target: null,
                log: `Player ${myPlayerNum} passed their turn.`
            });
        };

        function showGameOver(winnerId) {
            alert("Player " + winnerId + " Wins!");
            location.reload();
        }
    </script>
</body>
</html>
