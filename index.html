<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Username Edition</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; text-align: center;
            color: white; 
            /* RESTORED RGB GRADIENT */
            background: linear-gradient(-45deg, #0f0c29, #302b63, #24243e, #000000);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            background-attachment: fixed;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        #msg-display { font-size: 1.4em; height: 40px; color: #f1c40f; font-weight: bold; }
        #battle-log { 
            background: rgba(0,0,0,0.8); border: 1px solid #f1c40f; border-radius: 10px; 
            padding: 10px; margin: 10px auto; width: 80%; max-width: 600px; 
            font-family: monospace; color: #0f0; min-height: 20px;
        }
        .chip {
            display: inline-block; width: 30px; height: 30px; background: #e74c3c;
            border-radius: 50%; border: 2px solid #fff; margin-left: 10px; vertical-align: middle;
        }
        /* The Reroll Animation */
        .rolling {
            animation: shake 0.5s cubic-bezier(.36,.07,.19,.97) both;
            filter: brightness(1.5) drop-shadow(0 0 15px #f1c40f);
        }
        
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-5deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(5deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-10deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(10deg); }
        }
        #lobby-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        #lobby { padding: 30px; background: #222; border: 2px solid #444; border-radius: 20px; width: 350px; }
        .browser-box { width: 400px; background: #111; border: 1px solid #555; border-radius: 15px; padding: 15px; }
        .lobby-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { border: 2px solid #444; padding: 15px; border-radius: 12px; width: 420px; min-height: 400px; background: #222; position: relative; }
        .active { border-color: #f1c40f !important; box-shadow: 0 0 15px rgba(241, 196, 15, 0.2); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; padding: 10px; border-radius: 12px; border: 3px solid transparent; }
        .die-img { width: 65px; height: 65px; }
        .die-val { font-size: 1.5em; font-weight: bold; }
        
        .selected { border-color: #3498db; background: rgba(52, 152, 219, 0.2); }
        .target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .enemy-selected { border-color: rgba(255, 255, 255, 0.3); border-style: dashed; }
        
        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        @keyframes die-fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }

        .controls { margin-top: 20px; padding: 20px; background: #222; border-radius: 15px; display: inline-block; }
        button { padding: 10px 18px; cursor: pointer; border-radius: 8px; font-weight: bold; border: none; margin: 5px; text-transform: uppercase; }
        .btn-atk { background: #e67e22; color: white; }
        .btn-pass { background: #7f8c8d; color: white; }
        .hidden { display: none !important; }
        #game-over-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
        
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #333; color: white; margin-bottom: 10px; width: 80%; }
        .you-label { color: #3498db; font-size: 0.7em; margin-left: 5px; border: 1px solid #3498db; padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>MATHS WARRIORS ONLINE</h1>
    <div id="msg-display">Enter a Username to Start</div>
    <div id="battle-log" class="hidden"></div>

    <div id="lobby-container">
        <div id="lobby">
            <input type="text" id="username-input" placeholder="Your Username...">
            <input type="text" id="room-input" placeholder="Room Name...">
            <button class="btn-atk" onclick="joinRoom(1)" style="background:#3498db; width:100%; margin-top:5px;">Host Match</button>
        </div>
        <div class="browser-box">
            <h3 style="margin-top:0; color:#00d4ff;">OPEN LOBBIES</h3>
            <div id="room-list"></div>
        </div>
    </div>

    <div id="waiting-screen" class="hidden">
        <h2 style="color: #3498db;">WAITING FOR PLAYER 2...</h2>
        <button onclick="location.reload()">Cancel</button>
    </div>

    <div id="main-game" class="hidden">
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 id="p1-name-display">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 id="p2-name-display">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>
        <div class="controls">
            <input type="text" id="formula" style="width:120px; margin-bottom:0;" placeholder="Formula...">
            <button id="mind-btn" class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button id="strength-btn" class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button id="pass-btn" class="btn-pass" onclick="nextTurn()">Pass</button>
            <button style="background:#c0392b; color:white;" onclick="surrender()">Surrender</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
    
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
    
        let p1Dice = [], p2Dice = [], turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
        let selectedOwn = [], selectedOpp = null, enemySelections = [], enemyTarget = null, penChipOwner = 0;
        let p1Name = "Player 1", p2Name = "Player 2", myName = "";
    
        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;
        const setLog = (txt) => { const el = document.getElementById('battle-log'); el.innerText = txt; el.classList.remove('hidden'); };

        window.syncSelection = function() {
            if(!currentRoomName) return;
            const roomRef = ref(db, 'rooms/' + currentRoomName);
            if(myPlayerNum === 1) update(roomRef, { p1S: selectedOwn, p1T: selectedOpp });
            else update(roomRef, { p2S: selectedOwn, p2T: selectedOpp });
        };

        onValue(ref(db, 'rooms'), (snapshot) => {
            const listDiv = document.getElementById('room-list');
            listDiv.innerHTML = '';
            const rooms = snapshot.val();
            if (!rooms) return;
            Object.keys(rooms).forEach(key => {
                if (!rooms[key].winner && rooms[key].count < 2) {
                    const item = document.createElement('div');
                    item.className = 'lobby-item';
                    item.innerHTML = `<span><strong>${key}</strong> (vs ${rooms[key].p1Name})</span><button onclick="window.joinRoom(2, '${key}')">JOIN</button>`;
                    listDiv.appendChild(item);
                }
            });
        });

        const sortDice = (dice) => dice.sort((a, b) => a.v - b.v || a.s - b.s);

        window.joinRoom = async function(pNum, manualRoom = null) {
            const rName = manualRoom || document.getElementById('room-input').value.trim();
            myName = document.getElementById('username-input').value.trim() || "Warrior";
            if(!rName) return alert("Enter room name");
            
            myPlayerNum = pNum; currentRoomName = rName;
            const roomRef = ref(db, 'rooms/' + rName);

            if(pNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                let d1 = sortDice(sides.map(s => ({ s, v: roll(s) })));
                let d2 = sortDice(sides.map(s => ({ s, v: roll(s) })));
                
                let starter = 1;
                for(let i=0; i<6; i++) {
                    if(d1[i].v < d2[i].v) { starter = 1; break; }
                    if(d2[i].v < d1[i].v) { starter = 2; break; }
                    if(i === 5) starter = Math.random() > 0.5 ? 1 : 2;
                }

                set(roomRef, {
                    p1D: d1, p2D: d2, turn: starter, chip: starter, count: 1, 
                    p1Name: myName, p2Name: "Waiting...",
                    p1S: [], p2S: [], p1T: null, p2T: null, log: `${myName} created the match.`
                });
            } else { 
                update(roomRef, { count: 2, p2Name: myName }); 
            }
    
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.winner) return showGameOver(data.winner);

                if (data.count < 2) {
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('waiting-screen').classList.remove('hidden');
                } else {
                    document.getElementById('waiting-screen').classList.add('hidden');
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    
                    if(data.lastCap && data.lastCap.by !== myPlayerNum && !isAnimating) showEnemyCap(data.lastCap.t);
                    
                    enemySelections = (myPlayerNum === 1) ? (data.p2S || []) : (data.p1S || []);
                    enemyTarget = (myPlayerNum === 1) ? data.p2T : data.p1T;
                    p1Dice = data.p1D || []; p2Dice = data.p2D || [];
                    p1Name = data.p1Name; p2Name = data.p2Name;
                    turn = data.turn; penChipOwner = data.chip;
                    if(data.log) setLog(data.log);
                    if(!isAnimating) render();
                }
            });
        };
    
        function render() {
            drawDice('p1-dice', p1Dice, 1);
            drawDice('p2-dice', p2Dice, 2);
            
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            
            // Update Names
            document.getElementById('p1-name-display').innerHTML = p1Name + (myPlayerNum === 1 ? '<span class="you-label">YOU</span>' : '') + (penChipOwner === 1 ? '<div class="chip"></div>' : '');
            document.getElementById('p2-name-display').innerHTML = p2Name + (myPlayerNum === 2 ? '<span class="you-label">YOU</span>' : '') + (penChipOwner === 2 ? '<div class="chip"></div>' : '');

            setStatus(turn === myPlayerNum ? "YOUR TURN!" : `${turn === 1 ? p1Name : p2Name}'s Turn...`);
        }

        function drawDice(id, list, owner) {
            const container = document.getElementById(id); container.innerHTML = '';
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add('selected'); 
                if(owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add('target'); 
                if(owner !== myPlayerNum && enemySelections.includes(i)) wrapper.classList.add('enemy-selected');
                if(owner === myPlayerNum && enemyTarget === i) wrapper.classList.add('target');

                wrapper.innerHTML = `<img src="${(owner===1?P1_IMGS:P2_IMGS)[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(turn !== myPlayerNum) return;
                    if(owner === myPlayerNum) selectedOwn = selectedOwn.includes(i) ? selectedOwn.filter(x => x !== i) : [...selectedOwn, i];
                    else selectedOpp = (selectedOpp === i) ? null : i;
                    window.syncSelection(); render();
                };
                container.appendChild(wrapper);
            });
        }

        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die & 1 target!");
            let atk = (myPlayerNum === 1 ? p1Dice : p2Dice)[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2Dice : p1Dice)[selectedOpp];
            if(atk.v >= def.v) executeCap(`${myName} used Strength Attack! ${atk.v} ≥ ${def.v}`, atk, def);
            else setStatus("Strength too low!");
        };

        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice & 1 target!");
            
            const formulaString = document.getElementById('formula').value;
            const defVal = (myPlayerNum === 1 ? p2Dice : p1Dice)[selectedOpp].v;
            
            // 1. Get the values of the dice you actually clicked on the screen
            let availableValues = selectedOwn.map(idx => (myPlayerNum === 1 ? p1Dice : p2Dice)[idx].v);
            
            // 2. Extract all numbers from your typed formula (e.g., "(4*3)-2" -> [4, 3, 2])
            const usedNumbers = formulaString.match(/\d+/g)?.map(Number) || [];
        
            // 3. LOGIC CHECK: Are the numbers in the formula actually the ones you selected?
            // We create a copy of availableValues to "check off" numbers as we find them
            let tempAvailable = [...availableValues];
            let isValidSelection = true;
        
            if (usedNumbers.length === 0) return setStatus("Type a formula using numbers!");
        
            for (let num of usedNumbers) {
                let index = tempAvailable.indexOf(num);
                if (index > -1) {
                    tempAvailable.splice(index, 1); // Remove it so it can't be used twice unless you have two dice of that value
                } else {
                    isValidSelection = false;
                    break;
                }
            }
        
            // 4. Also check if you selected dice but didn't use them in the formula
            if (tempAvailable.length > 0 || !isValidSelection) {
                return setStatus("Formula numbers must match SELECTED dice exactly!");
            }
        
            // 5. If numbers match, run the math evaluation
            try {
                // We use a slightly safer way to eval here
                if(eval(formulaString) === defVal) {
                    executeCap(`${myName} used Mind Attack! ${formulaString} = ${defVal}`);
                } else {
                    setStatus(`Math result is ${eval(formulaString)}, but target is ${defVal}!`);
                }
            } catch(e) {
                setStatus("Invalid Formula Syntax!");
            }
        };

        window.executeCap = function(logMsg, atkDie, defDie) {
            isAnimating = true;
            const defSide = (myPlayerNum === 1 ? 2 : 1);
            const targetEl = document.getElementById(`die-${defSide}-${selectedOpp}`);
            
            // 1. Start Capture Animation (Target falls away)
            if(targetEl) targetEl.classList.add('captured');
        
            setTimeout(() => {
                let myD = (myPlayerNum === 1 ? p1Dice : p2Dice);
                let opD = (myPlayerNum === 1 ? p2Dice : p1Dice);
                
                // Penalty Chip Check
                if(opD.length === 1 && penChipOwner === myPlayerNum) {
                    if(atkDie && atkDie.v <= defDie.v) {
                        update(ref(db, 'rooms/' + currentRoomName), { 
                            winner: (myPlayerNum === 1 ? 2 : 1), 
                            log: `Penalty Chip Violation: ${myName} failed the final blow!` 
                        });
                        return;
                    }
                }
        
                // 2. Visual "Shake" for the dice being rerolled
                selectedOwn.forEach(idx => {
                    const el = document.getElementById(`die-${myPlayerNum}-${idx}`);
                    if(el) el.classList.add('rolling');
                });
        
                // Small delay so the player can see the "rolling" shake before the numbers flip
                setTimeout(() => {
                    opD.splice(selectedOpp, 1);
                    
                    if(opD.length === 0) {
                        update(ref(db, 'rooms/' + currentRoomName), { winner: myPlayerNum, log: logMsg });
                        return;
                    }
                    
                    // Reroll values
                    selectedOwn.forEach(idx => { 
                        myD[idx].v = Math.floor(Math.random() * myD[idx].s) + 1; 
                    });
        
                    // Re-sort dice after reroll
                    const newP1 = myPlayerNum === 1 ? sortDice(myD) : opD;
                    const newP2 = myPlayerNum === 2 ? sortDice(myD) : opD;
        
                    // Reset UI states
                    selectedOwn = []; 
                    selectedOpp = null;
                    document.getElementById('formula').value = "";
        
                    // 3. Update Firebase
                    update(ref(db, 'rooms/' + currentRoomName), {
                        p1D: newP1,
                        p2D: newP2,
                        turn: (myPlayerNum === 1 ? 2 : 1),
                        p1S: [], p2S: [], p1T: null, p2T: null,
                        log: logMsg,
                        lastCap: null 
                    }).then(() => {
                        isAnimating = false;
                        render(); // This will clear the .rolling classes because it re-draws the dice
                    });
                }, 500); // Shake duration
        
            }, 600); // Capture animation duration
        };

        window.nextTurn = function() {
            update(ref(db, 'rooms/' + currentRoomName), { 
                turn: (myPlayerNum === 1 ? 2 : 1), p1S: [], p2S: [], p1T: null, p2T: null, lastCap: null,
                log: `${myName} skipped their turn.`
            });
        };

        window.surrender = function() {
            if(confirm("Surrender?")) update(ref(db, 'rooms/' + currentRoomName), { winner: (myPlayerNum === 1 ? 2 : 1), log: `${myName} surrendered.` });
        };

        function showGameOver(winnerId) {
            if (document.getElementById('game-over-overlay')) return;
            const isWin = (winnerId === myPlayerNum);
            const winnerName = (winnerId === 1 ? p1Name : p2Name);
            const overlay = document.createElement('div');
            overlay.id = 'game-over-overlay';
            overlay.innerHTML = `<h1 style="color:${isWin?'#f1c40f':'#e74c3c'}">${isWin ? 'VICTORY' : 'DEFEAT'}</h1><h3>${winnerName} wins the match!</h3><button onclick="location.reload()">Back to Lobby</button>`;
            document.body.appendChild(overlay);
            if (isWin) confetti({ particleCount: 200, spread: 100, origin: { y: 0.6 } });
        }

        function showEnemyCap(idx) {
            isAnimating = true;
            const target = document.getElementById(`die-${myPlayerNum}-${idx}`);
            if(target) target.classList.add('captured');
            setTimeout(() => { isAnimating = false; render(); }, 700);
        }
    </script>
</body>
</html>
