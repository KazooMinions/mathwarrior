<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Online Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        body { 
            background-image: url('https://t3.ftcdn.net/jpg/04/83/90/18/360_F_483901821_46VsNR67uJC3xIKQN4aaxR6GtAZhx9G8.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f0f1a;
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; padding: 20px; overflow-x: hidden; 
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        #msg-display { font-size: 1.5em; height: 40px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        
        /* Lobby Browser Styling */
        #lobby-container { display: flex; flex-direction: column; align-items: center; gap: 20px; margin-top: 30px; }
        #lobby { padding: 30px; background: rgba(30, 30, 30, 0.9); border: 2px solid #444; border-radius: 20px; width: 350px; }
        
        .browser-box { width: 400px; background: rgba(20, 20, 20, 0.8); border: 1px solid #555; border-radius: 15px; padding: 15px; max-height: 300px; overflow-y: auto; }
        .lobby-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #333; }
        .status-open { color: #27ae60; font-weight: bold; font-size: 0.8em; }
        .status-full { color: #e74c3c; font-weight: bold; font-size: 0.8em; }

        .room-input { background: #333; border: 1px solid #555; color: #0f0; padding: 12px; font-size: 1.2em; width: 80%; border-radius: 8px; margin-bottom: 20px; outline: none; }
        
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { border: 2px solid #444; padding: 15px; border-radius: 12px; width: 420px; min-height: 380px; background: rgba(30,30,30,0.8); transition: 0.4s; }
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 12px; border: 3px solid transparent; }
        .die-img { width: 75px; height: 75px; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.8)); }
        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        .penalty-chip {
            width: 25px;
            height: 25px;
            background: #e74c3c;
            border: 2px solid #ffffff;
            border-radius: 50%;
            display: inline-block;
            margin-left: 10px;
            box-shadow: 0 0 10px rgba(231, 76, 60, 0.8);
            vertical-align: middle;
        }
        @keyframes die-fall { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(200px); opacity: 0; } }

        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); transform: translateY(-8px); }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .die-val { font-size: 1.8em; font-weight: bold; text-shadow: 2px 2px 4px black; }

        .controls { margin-top: 30px; padding: 25px; background: rgba(34,34,34,0.9); border-radius: 15px; display: inline-block; }
        button { padding: 10px 20px; font-size: 14px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; text-transform: uppercase; }
        .btn-atk { background: #e67e22; color: white; border-bottom: 4px solid #d35400; }
        .btn-pass { background: #7f8c8d; color: white; }
        .hidden { display: none !important; }

        #game-over-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000; }
    </style>
</head>
<body>

    <h1>MATHS WARRIORS ONLINE</h1>
    <div id="msg-display">Welcome! Practice the great game of Math Warriors here!</div>

    <div id="lobby-container">
        <div id="lobby">
            <input type="text" id="room-input" class="room-input" placeholder="Room Name..."><br>
            <button class="btn-atk" onclick="joinRoom(1)" style="background:#3498db; width:100%;">Create New Room</button>
            <p style="font-size:0.8em; color:#888; margin-top:15px;">Enter a name to host, or join below</p>
        </div>

        <div class="browser-box">
            <h3 style="margin-top:0; color:#00d4ff; font-size:0.9em;">ACTIVE LOBBIES</h3>
            <div id="room-list"><p style="color:#555">Scanning...</p></div>
        </div>
    </div>

    <div id="waiting-screen" class="hidden">
        <h2 style="color: #3498db; margin-top: 100px; animation: pulse 1s infinite;">WAITING FOR OPPONENT...</h2>
        <h3 style="color: #000000;">ROOM CODE: <span id="waiting-room-display"></span></h3>
        <button onclick="location.reload()" style="background:#c0392b; color:white;">Cancel and Leave</button>
    </div>

    <div id="main-game" class="hidden">
        <div id="room-tag" style="margin-bottom:10px; color:#aaa;">ROOM: <span id="room-id-display" style="color:#fff;"></span></div>
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 style="color:#3498db;">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 style="color:#27ae60;">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="formula" style="background:#333; color:#0f0; border:1px solid #555; padding:10px; border-radius:5px;" placeholder="e.g. 5+2">
            <button id="mind-btn" class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button id="strength-btn" class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button id="pass-btn" class="btn-pass" onclick="nextTurn()">Pass Turn</button>
            <button class="btn-pass" style="background:#c0392b;" onclick="surrender()">Surrender</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, get } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
    
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
    
        let p1 = { dice: [] }, p2 = { dice: [] }, turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
        let selectedOwn = [], selectedOpp = null;
        let penaltyChipOwner = 0;
    
        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;

        // --- LOBBY BROWSER LOGIC ---
        onValue(ref(db, 'rooms'), (snapshot) => {
            const rooms = snapshot.val();
            const listDiv = document.getElementById('room-list');
            listDiv.innerHTML = '';
            if (!rooms) { listDiv.innerHTML = '<p style="color:#555">No active rooms found.</p>'; return; }

            Object.keys(rooms).forEach(key => {
                const r = rooms[key];
                if (r.winner) return;
                const isFull = r.count >= 2;
                const item = document.createElement('div');
                item.className = 'lobby-item';
                item.innerHTML = `
                    <span><strong>${key}</strong></span>
                    <span class="${isFull ? 'status-full' : 'status-open'}">${isFull ? 'FULL' : 'OPEN'}</span>
                    <button class="btn-atk" style="padding:5px 10px; font-size:10px; background:${isFull ? '#444' : '#27ae60'}" 
                        onclick="window.joinRoom(2, '${key}')" ${isFull ? 'disabled' : ''}>JOIN</button>
                `;
                listDiv.appendChild(item);
            });
        });
    
        window.joinRoom = async function(pNum, manualRoom = null) {
            const rName = manualRoom || document.getElementById('room-input').value.trim();
            if(!rName) return alert("Please enter a room name!");
            
            const roomRef = ref(db, 'rooms/' + rName);
            const snapshot = await get(roomRef);
            
            // FIX: Room Validation
            if (pNum === 1 && snapshot.exists()) {
                return alert("This room already exists! Use a different name or Join as P2.");
            }
            if (pNum === 2 && !snapshot.exists()) {
                return alert("Room not found! Ensure Player 1 has created it.");
            }

            document.getElementById('waiting-room-display').innerText = rName;
            
            myPlayerNum = pNum;
            currentRoomName = rName;
            document.getElementById('room-id-display').innerText = rName;

            if(myPlayerNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                
                // Create dice and sort by value (ascending), then by sides if values are equal
                let p1Dice = sides.map(s => ({ s, v: roll(s) })).sort((a,b) => a.v - b.v || a.s - b.s);
                let p2Dice = sides.map(s => ({ s, v: roll(s) })).sort((a,b) => a.v - b.v || a.s - b.s);
    
                // Determine who starts (Lower relative value)
                let starter = 1;
                for(let i = 0; i < 6; i++) {
                    if(p1Dice[i].v < p2Dice[i].v) {
                        starter = 1; 
                        break;
                    }
                    if(p2Dice[i].v < p1Dice[i].v) {
                        starter = 2; 
                        break;
                    }
                    // If all 6 dice are identical, coin flip
                    if(i === 5) starter = Math.random() > 0.5 ? 1 : 2;
                }
    
                set(roomRef, {
                    p1Dice: p1Dice,
                    p2Dice: p2Dice,
                    turn: starter,
                    penaltyChipOwner: starter, // The person who starts gets the penalty chip
                    lastCap: null,
                    winner: null,
                    count: 1
                });
    
            onValue(roomRef, (snap) => {
                const data = snap.val();
                if(!data) return;
                penaltyChipOwner = data.penaltyChipOwner;
                if(data.winner) return showGameOver(data.winner);

                if (!data.count || data.count < 2) {
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('waiting-screen').classList.remove('hidden');
                } else {
                    document.getElementById('waiting-screen').classList.add('hidden');
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    
                    if(data.lastCap && data.lastCap.by !== myPlayerNum && !isAnimating) {
                        showEnemyCaptureAnim(data.lastCap.targetIdx);
                    }
                    p1.dice = data.p1Dice || [];
                    p2.dice = data.p2Dice || [];
                    turn = data.turn;
                    if(!isAnimating) render();
                }
            });
        };
        function render() {
            // Clear existing chips
            document.querySelectorAll('.penalty-chip').forEach(el => el.remove());
            // Add chip to the owner's header
            const ownerArea = document.querySelector(`#p${penaltyChipOwner}-area h3`);
            if(ownerArea) {
                const chip = document.createElement('span');
                chip.className = 'penalty-chip';
                chip.title = "Penalty Chip: Must win final capture with a HIGHER value";
                ownerArea.appendChild(chip);
            }
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            const isMyTurn = (turn === myPlayerNum);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            setStatus(isMyTurn ? "YOUR TURN!" : "Enemy thinking...");
            document.getElementById('mind-btn').disabled = !isMyTurn;
            document.getElementById('strength-btn').disabled = !isMyTurn;
            document.getElementById('pass-btn').disabled = !isMyTurn;
        }    

        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            const imgSet = (owner === 1) ? P1_IMGS : P2_IMGS;
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add('selected');
                if(owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add('target');
                wrapper.innerHTML = `<img src="${imgSet[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(turn !== myPlayerNum) return;
                    if(owner === myPlayerNum) {
                        if(selectedOwn.includes(i)) selectedOwn = selectedOwn.filter(x => x !== i);
                        else selectedOwn.push(i);
                    } else { selectedOpp = i; }
                    render();
                };
                container.appendChild(wrapper);
            });
        }

        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die and 1 target!");
            let atk = (myPlayerNum === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2 : p1).dice[selectedOpp];
            if(atk.v >= def.v) executeCapture(); else setStatus("Strength too low!");
        };

        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            try {
                const defender = (myPlayerNum === 1 ? p2 : p1);
                if(eval(formula) === defender.dice[selectedOpp].v) executeCapture(); else setStatus("Calculation error!");
            } catch(e) { setStatus("Invalid Formula!"); }
        };

        window.executeCapture = function() {
            isAnimating = true;
            const defSide = (myPlayerNum === 1 ? 2 : 1);
            const targetDie = document.getElementById(`die-${defSide}-${selectedOpp}`);
            if(targetDie) targetDie.classList.add('captured');
            
            setTimeout(() => {
                let atk = (myPlayerNum === 1 ? p1 : p2);
                let def = (myPlayerNum === 1 ? p2 : p1);
                def.dice.splice(selectedOpp, 1);
                if(def.dice.length === 0) {
                    update(ref(db, 'rooms/' + currentRoomName), { winner: myPlayerNum });
                    return;
                }
                selectedOwn.forEach(idx => { atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1; });
                update(ref(db, 'rooms/' + currentRoomName), {
                    p1Dice: p1.dice, p2Dice: p2.dice,
                    turn: (myPlayerNum === 1 ? 2 : 1),
                    lastCap: { by: myPlayerNum, targetIdx: selectedOpp }
                });
                selectedOwn = []; selectedOpp = null; isAnimating = false; render();
            }, 700);
        }

        window.nextTurn = function() {
            if(turn !== myPlayerNum) return;
            update(ref(db, 'rooms/' + currentRoomName), { turn: (myPlayerNum === 1 ? 2 : 1), lastCap: null });
        };

        window.surrender = function() {
            if(confirm("Surrender?")) update(ref(db, 'rooms/' + currentRoomName), { winner: (myPlayerNum === 1 ? 2 : 1) });
        };

        function showGameOver(winnerId) {
            if (document.getElementById('game-over-overlay')) return;
            const isWin = winnerId === myPlayerNum;
            const overlay = document.createElement('div');
            overlay.id = 'game-over-overlay';
            
            // Style the text based on win/loss
            const titleStyle = isWin 
                ? "color: #f1c40f; text-shadow: 0 0 20px #f1c40f;" 
                : "color: #e74c3c; text-shadow: 0 0 20px #e74c3c;";
        
            overlay.innerHTML = `
                <h1 style="font-size: 5em; ${titleStyle}">${isWin ? 'VICTORY' : 'DEFEATED'}</h1>
                <button onclick="location.reload()" style="padding: 15px 30px; font-size: 1.2em; cursor: pointer;">NEW BATTLE</button>
            `;
            
            document.body.appendChild(overlay);
        
            // Trigger Confetti if winner
            if (isWin) {
                confetti({
                    particleCount: 150,
                    spread: 70,
                    origin: { y: 0.6 },
                    colors: ['#f1c40f', '#ffffff', '#3498db']
                });
            }
        }

        function showEnemyCaptureAnim(idx) {
            isAnimating = true;
            const target = document.getElementById(`die-${myPlayerNum}-${idx}`);
            if(target) target.classList.add('captured');
            setTimeout(() => { isAnimating = false; render(); }, 700);
        }
    </script>
</body>
</html>
