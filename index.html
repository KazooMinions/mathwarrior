<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Math Warriors - Elite Arena</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Segoe+UI:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-auth-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    
    <style>
        :root {
            --p1-neon: #00d4ff;
            --p2-neon: #39ff14;
            --glass: rgba(255, 255, 255, 0.07);
            --border: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0; padding: 20px; font-family: 'Segoe UI', sans-serif; text-align: center;
            color: white; background: #050505;
            background: radial-gradient(circle at 50% 50%, #1a1a2e 0%, #050505 100%);
            background-attachment: fixed;
            min-height: 100vh;
        }

        h1 { font-family: 'Orbitron', sans-serif; letter-spacing: 4px; text-shadow: 0 0 15px var(--p1-neon); }

        /* Glassmorphism UI */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.8);
        }

        /* Leaderboard */
        #leaderboard-box {
            position: fixed; top: 20px; right: 20px; width: 200px; padding: 15px;
            font-size: 0.85em; text-align: left; z-index: 100;
        }
        .lb-entry { display: flex; justify-content: space-between; margin-bottom: 5px; color: #f1c40f; border-bottom: 1px solid var(--border); }

        /* YouTube Icon */
        #tutorial-btn {
            position: fixed; bottom: 30px; right: 30px;
            background: #ff0000; color: white; width: 60px; height: 60px;
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 24px; text-decoration: none; box-shadow: 0 0 20px rgba(255,0,0,0.5);
            transition: 0.3s; z-index: 1000;
        }
        #tutorial-btn:hover { transform: scale(1.1) rotate(10deg); }

        /* Game Board */
        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { padding: 20px; width: 420px; min-height: 400px; transition: 0.3s; }
        #p1-area.active { border: 2px solid var(--p1-neon); box-shadow: 0 0 20px rgba(0, 212, 255, 0.3); }
        #p2-area.active { border: 2px solid var(--p2-neon); box-shadow: 0 0 20px rgba(57, 255, 20, 0.3); }

        /* Dice Styling */
        .die-wrapper { 
            padding: 10px; border-radius: 15px; border: 2px solid transparent; transition: 0.2s; 
            background: rgba(0,0,0,0.2);
        }
        .selected { border-color: var(--p1-neon); background: rgba(0, 212, 255, 0.1); transform: scale(1.05); }
        .target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; transform: scale(1.05); }
        
        /* Login */
        .btn-google {
            background: white; color: #444; padding: 12px 24px; border-radius: 8px;
            font-weight: bold; cursor: pointer; border: none; display: flex; 
            align-items: center; gap: 10px; margin: 20px auto; font-family: sans-serif;
        }

        #msg-display { font-size: 1.4em; height: 40px; color: #f1c40f; font-weight: bold; margin: 10px; }
        #battle-log { background: rgba(0,0,0,0.6); color: #0f0; padding: 10px; border-radius: 10px; width: 60%; margin: 10px auto; font-family: monospace; }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; }
        .die-img { width: 65px; height: 65px; }
        .die-val { font-size: 1.5em; font-weight: bold; }
        
        .chip { display: inline-block; width: 25px; height: 25px; background: #e74c3c; border-radius: 50%; border: 2px solid #fff; margin-left: 10px; vertical-align: middle; box-shadow: 0 0 10px #e74c3c;}
        .hidden { display: none !important; }

        /* Animations */
        @keyframes shake {
            10%, 90% { transform: translate3d(-1px, 0, 0) rotate(-5deg); }
            20%, 80% { transform: translate3d(2px, 0, 0) rotate(5deg); }
            30%, 50%, 70% { transform: translate3d(-4px, 0, 0) rotate(-10deg); }
            40%, 60% { transform: translate3d(4px, 0, 0) rotate(10deg); }
        }
        .rolling { animation: shake 0.5s both; filter: brightness(1.5) drop-shadow(0 0 10px #f1c40f); }
        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        @keyframes die-fall { 100% { transform: translateY(200px) rotate(20deg); opacity: 0; } }
        
        input { padding: 10px; border-radius: 5px; border: 1px solid #444; background: #111; color: white; margin: 5px; }
        button { padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: bold; border: none; transition: 0.2s; }
        button:hover { filter: brightness(1.2); }
        .you-label { color: var(--p1-neon); font-size: 0.7em; margin-left: 5px; border: 1px solid var(--p1-neon); padding: 2px 5px; border-radius: 4px; }
    </style>
</head>
<body>

    <a href="https://www.youtube.com/watch?v=UtxP1o-moA8" id="tutorial-btn" target="_blank" title="How to Play">
        <i class="fab fa-youtube"></i>
    </a>

    <div id="leaderboard-box" class="glass-panel">
        <h4 style="margin:0 0 10px 0; color: var(--p1-neon); text-align:center;">TOP WARRIORS</h4>
        <div id="lb-list"></div>
    </div>

    <h1>MATHS WARRIORS ONLINE</h1>

    <div id="auth-container">
        <div class="glass-panel" style="padding: 40px; display: inline-block;">
            <p>Sign in to track your wins and enter the arena</p>
            <button id="login-btn" class="btn-google">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Google_%22G%22_Logo.svg" width="20">
                Continue with Google
            </button>
        </div>
    </div>

    <div id="msg-display" class="hidden">Waiting...</div>
    <div id="battle-log" class="hidden"></div>

    <div id="lobby-container" class="hidden">
        <div id="lobby" class="glass-panel" style="padding: 30px; width: 350px; margin: 20px auto;">
            <h3 id="welcome-msg">Welcome, Warrior</h3>
            <input type="text" id="room-input" placeholder="Room Name..." style="width: 80%;">
            <button style="background:var(--p1-neon); color:black; width: 85%; margin-top:10px;" onclick="joinRoom(1)">HOST MATCH</button>
        </div>
        <div class="glass-panel browser-box" style="width: 410px; padding: 15px; margin: 20px auto;">
            <h3 style="margin-top:0; color:var(--p1-neon);">OPEN LOBBIES</h3>
            <div id="room-list"></div>
        </div>
    </div>

    <div id="waiting-screen" class="hidden">
        <div class="glass-panel" style="padding: 30px; display: inline-block;">
            <h2 style="color: var(--p1-neon);">WAITING FOR OPPONENT...</h2>
            <button onclick="location.reload()" style="background:#444; color:white;">Cancel</button>
        </div>
    </div>

    <div id="main-game" class="hidden">
        <div class="board">
            <div id="p1-area" class="player-side glass-panel">
                <h3 id="p1-name-display">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side glass-panel">
                <h3 id="p2-name-display">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>
        <div class="glass-panel" style="margin-top:20px; padding: 20px; display: inline-block;">
            <input type="text" id="formula" style="width:140px;" placeholder="Formula...">
            <button id="mind-btn" style="background:#e67e22; color:white;" onclick="doMind()">Mind Attack</button>
            <button id="strength-btn" style="background:#d35400; color:white;" onclick="doStrength()">Strength Attack</button>
            <button style="background:#7f8c8d; color:white;" onclick="nextTurn()">Pass</button>
            <button style="background:#c0392b; color:white;" onclick="surrender()">Surrender</button>
        </div>
    </div>

    <script>
        // --- FIREBASE INITIALIZATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // Variables
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
        
        let p1Dice = [], p2Dice = [], turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
        let selectedOwn = [], selectedOpp = null, enemySelections = [], enemyTarget = null, penChipOwner = 0;
        let p1Name = "", p2Name = "", myName = "", currentUser = null;

        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;
        const setLog = (txt) => { const el = document.getElementById('battle-log'); el.innerText = txt; el.classList.remove('hidden'); };
        const sortDice = (dice) => dice.sort((a, b) => a.v - b.v || a.s - b.s);

        // --- AUTH & LEADERBOARD LOGIC ---
        document.getElementById('login-btn').onclick = () => {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider);
        };

        auth.onAuthStateChanged(user => {
            if (user) {
                currentUser = user;
                myName = user.displayName;
                document.getElementById('auth-container').classList.add('hidden');
                document.getElementById('lobby-container').classList.remove('hidden');
                document.getElementById('msg-display').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Welcome, ${myName}`;
                
                // Initialize score if new
                db.ref('leaderboard/' + user.uid).update({ name: myName });
            }
        });

        // Live Leaderboard
        db.ref('leaderboard').orderByChild('wins').limitToLast(5).on('value', snap => {
            const list = document.getElementById('lb-list');
            list.innerHTML = '';
            let players = [];
            snap.forEach(c => players.push(c.val()));
            players.reverse().forEach(p => {
                list.innerHTML += `<div class="lb-entry"><span>${p.name}</span><span>${p.wins || 0} Wins</span></div>`;
            });
        });

        // --- GAME LOGIC ---
        window.syncSelection = function() {
            if(!currentRoomName) return;
            const roomRef = db.ref('rooms/' + currentRoomName);
            if(myPlayerNum === 1) roomRef.update({ p1S: selectedOwn, p1T: selectedOpp });
            else roomRef.update({ p2S: selectedOwn, p2T: selectedOpp });
        };

        db.ref('rooms').on('value', (snapshot) => {
            const listDiv = document.getElementById('room-list');
            listDiv.innerHTML = '';
            const rooms = snapshot.val();
            if (!rooms) return;
            Object.keys(rooms).forEach(key => {
                if (!rooms[key].winner && rooms[key].count < 2) {
                    const item = document.createElement('div');
                    item.className = 'lb-entry';
                    item.style.padding = "10px";
                    item.innerHTML = `<span>${key} (${rooms[key].p1Name})</span><button onclick="joinRoom(2, '${key}')" style="background:var(--p2-neon); color:black; padding:5px 10px;">JOIN</button>`;
                    listDiv.appendChild(item);
                }
            });
        });

        window.joinRoom = function(pNum, manualRoom = null) {
            const rName = manualRoom || document.getElementById('room-input').value.trim();
            if(!rName) return alert("Enter room name");
            
            myPlayerNum = pNum; currentRoomName = rName;
            const roomRef = db.ref('rooms/' + rName);

            if(pNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                let d1 = sortDice(sides.map(s => ({ s, v: roll(s) })));
                let d2 = sortDice(sides.map(s => ({ s, v: roll(s) })));
                let starter = Math.random() > 0.5 ? 1 : 2;

                roomRef.set({
                    p1D: d1, p2D: d2, turn: starter, chip: starter, count: 1, 
                    p1Name: myName, p2Name: "Waiting...",
                    p1S: [], p2S: [], p1T: null, p2T: null, log: `${myName} waiting for a challenger.`
                });
            } else { 
                roomRef.update({ count: 2, p2Name: myName }); 
            }
    
            roomRef.on('value', (snap) => {
                const data = snap.val();
                if(!data) return;
                if(data.winner) return showGameOver(data.winner);

                if (data.count < 2) {
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('waiting-screen').classList.remove('hidden');
                } else {
                    document.getElementById('waiting-screen').classList.add('hidden');
                    document.getElementById('lobby-container').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    
                    if(data.lastCap && data.lastCap.by !== myPlayerNum && !isAnimating) showEnemyCap(data.lastCap.t);
                    
                    enemySelections = (myPlayerNum === 1) ? (data.p2S || []) : (data.p1S || []);
                    enemyTarget = (myPlayerNum === 1) ? data.p2T : data.p1T;
                    p1Dice = data.p1D || []; p2Dice = data.p2D || [];
                    p1Name = data.p1Name; p2Name = data.p2Name;
                    turn = data.turn; penChipOwner = data.chip;
                    if(data.log) setLog(data.log);
                    if(!isAnimating) render();
                }
            });
        };
    
        function render() {
            drawDice('p1-dice', p1Dice, 1);
            drawDice('p2-dice', p2Dice, 2);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side glass-panel active' : 'player-side glass-panel';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side glass-panel active' : 'player-side glass-panel';
            document.getElementById('p1-name-display').innerHTML = p1Name + (myPlayerNum === 1 ? '<span class="you-label">YOU</span>' : '') + (penChipOwner === 1 ? '<div class="chip"></div>' : '');
            document.getElementById('p2-name-display').innerHTML = p2Name + (myPlayerNum === 2 ? '<span class="you-label">YOU</span>' : '') + (penChipOwner === 2 ? '<div class="chip"></div>' : '');
            setStatus(turn === myPlayerNum ? "YOUR TURN!" : `${turn === 1 ? p1Name : p2Name}'s Turn...`);
        }

        function drawDice(id, list, owner) {
            const container = document.getElementById(id); container.innerHTML = '';
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add('selected'); 
                if(owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add('target'); 
                if(owner !== myPlayerNum && enemySelections.includes(i)) wrapper.classList.add('enemy-selected');
                if(owner === myPlayerNum && enemyTarget === i) wrapper.classList.add('target');
                wrapper.innerHTML = `<img src="${(owner===1?P1_IMGS:P2_IMGS)[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(turn !== myPlayerNum) return;
                    if(owner === myPlayerNum) selectedOwn = selectedOwn.includes(i) ? selectedOwn.filter(x => x !== i) : [...selectedOwn, i];
                    else selectedOpp = (selectedOpp === i) ? null : i;
                    syncSelection(); render();
                };
                container.appendChild(wrapper);
            });
        }

        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die & 1 target!");
            let atk = (myPlayerNum === 1 ? p1Dice : p2Dice)[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2Dice : p1Dice)[selectedOpp];
            if(atk.v >= def.v) executeCap(`${myName} crushed ${def.v} with Strength!`, atk, def);
            else setStatus("Strength too low!");
        };

        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice & 1 target!");
            const formulaString = document.getElementById('formula').value;
            const defVal = (myPlayerNum === 1 ? p2Dice : p1Dice)[selectedOpp].v;
            let available = selectedOwn.map(idx => (myPlayerNum === 1 ? p1Dice : p2Dice)[idx].v);
            const used = formulaString.match(/\d+/g)?.map(Number) || [];
            let tempAvail = [...available];
            let valid = true;
            if (used.length === 0) return setStatus("Enter a formula!");
            for (let num of used) {
                let idx = tempAvail.indexOf(num);
                if (idx > -1) tempAvail.splice(idx, 1);
                else { valid = false; break; }
            }
            if (tempAvail.length > 0 || !valid) return setStatus("Dice must match formula!");
            try {
                if(eval(formulaString) === defVal) executeCap(`${myName} used Mind Attack! ${formulaString} = ${defVal}`);
                else setStatus(`Math mismatch! Result: ${eval(formulaString)}`);
            } catch(e) { setStatus("Invalid Math!"); }
        };

        window.executeCap = function(logMsg, atkDie, defDie) {
            isAnimating = true;
            const defSide = (myPlayerNum === 1 ? 2 : 1);
            const targetEl = document.getElementById(`die-${defSide}-${selectedOpp}`);
            if(targetEl) targetEl.classList.add('captured');

            setTimeout(() => {
                let myD = (myPlayerNum === 1 ? p1Dice : p2Dice);
                let opD = (myPlayerNum === 1 ? p2Dice : p1Dice);
                
                if(opD.length === 1 && penChipOwner === myPlayerNum) {
                    if(atkDie && atkDie.v <= defDie.v) {
                        db.ref('rooms/' + currentRoomName).update({ winner: (myPlayerNum === 1 ? 2 : 1), log: `Penalty Violation! ${myName} lost.` });
                        return;
                    }
                }

                selectedOwn.forEach(idx => {
                    const el = document.getElementById(`die-${myPlayerNum}-${idx}`);
                    if(el) el.classList.add('rolling');
                });

                setTimeout(() => {
                    opD.splice(selectedOpp, 1);
                    if(opD.length === 0) {
                        db.ref('rooms/' + currentRoomName).update({ winner: myPlayerNum, log: logMsg });
                        return;
                    }
                    selectedOwn.forEach(idx => { myD[idx].v = Math.floor(Math.random() * myD[idx].s) + 1; });
                    
                    db.ref('rooms/' + currentRoomName).update({
                        p1D: sortDice(p1Dice), p2D: sortDice(p2Dice),
                        turn: (myPlayerNum === 1 ? 2 : 1),
                        p1S: [], p2S: [], p1T: null, p2T: null,
                        log: logMsg, lastCap: { by: myPlayerNum, t: selectedOpp }
                    }).then(() => {
                        selectedOwn = []; selectedOpp = null; isAnimating = false;
                        document.getElementById('formula').value = "";
                        render();
                    });
                }, 500);
            }, 600);
        };

        window.nextTurn = function() {
            db.ref('rooms/' + currentRoomName).update({ turn: (myPlayerNum === 1 ? 2 : 1), log: `${myName} passed.` });
        };

        window.surrender = function() {
            if(confirm("Accept defeat?")) db.ref('rooms/' + currentRoomName).update({ winner: (myPlayerNum === 1 ? 2 : 1), log: `${myName} surrendered.` });
        };

        function showGameOver(winnerId) {
            if (document.getElementById('game-over-overlay')) return;
            const isWin = (winnerId === myPlayerNum);
            
            // Record win if applicable
            if (isWin && currentUser) {
                db.ref('leaderboard/' + currentUser.uid + '/wins').transaction(c => (c || 0) + 1);
            }

            const overlay = document.createElement('div');
            overlay.id = 'game-over-overlay';
            overlay.style = "position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:2000;";
            overlay.innerHTML = `<h1 style="font-size:4em; color:${isWin?'var(--p1-neon)':'#e74c3c'}">${isWin ? 'VICTORY' : 'DEFEAT'}</h1><button onclick="location.reload()" style="padding:15px 30px; font-size:1.2em;">Back to Lobby</button>`;
            document.body.appendChild(overlay);
            if (isWin) confetti({ particleCount: 250, spread: 80 });
        }

        function showEnemyCap(idx) {
            isAnimating = true;
            const target = document.getElementById(`die-${myPlayerNum}-${idx}`);
            if(target) target.classList.add('captured');
            setTimeout(() => { isAnimating = false; render(); }, 700);
        }
    </script>
</body>
</html>
