<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Maths Warriors - Online Multiplayer</title>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <style>
        body { 
            /* Replace the URL below with your own image link! */
            background-image: url('https://t3.ftcdn.net/jpg/04/83/90/18/360_F_483901821_46VsNR67uJC3xIKQN4aaxR6GtAZhx9G8.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-color: #0f0f1a; /* Fallback color */
            color: white; 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            text-align: center; 
            margin: 0; 
            padding: 20px; 
            overflow-x: hidden; 
        }

        /* Semi-transparent overlay to help text pop against the image */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4); /* Darkens the image slightly */
            z-index: -1;
        }

        #msg-display { font-size: 1.5em; height: 40px; color: #f1c40f; margin-bottom: 10px; font-weight: bold; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0,0,0,0.8); }
        /* Lobby & Room Header */
        #lobby { padding: 40px; background: #1e1e1e; border: 2px solid #444; border-radius: 20px; display: inline-block; margin-top: 50px; }
        .room-input { background: #333; border: 1px solid #555; color: #0f0; padding: 12px; font-size: 1.2em; width: 250px; border-radius: 8px; margin-bottom: 20px; outline: none; }
        #room-tag { font-size: 0.9em; color: #888; margin-bottom: 20px; }

        .board { display: flex; justify-content: center; gap: 20px; margin-top: 10px; }
        .player-side { 
            border: 2px solid #444; padding: 15px; border-radius: 12px; 
            width: 420px; min-height: 380px; background: #1e1e1e; position: relative;
            transition: 0.4s;
        }
        
        #p1-area.active { border-color: #3498db; box-shadow: 0 0 20px rgba(52, 152, 219, 0.4); }
        #p2-area.active { border-color: #27ae60; box-shadow: 0 0 20px rgba(39, 174, 96, 0.4); }
        
        .dice-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-top: 15px; }
        .die-wrapper { display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.3s; padding: 10px; border-radius: 12px; border: 3px solid transparent; }
        .die-img { width: 75px; height: 75px; object-fit: contain; margin-bottom: 5px; filter: drop-shadow(0px 6px 6px rgba(0,0,0,0.8)); }

        /* Animations */
        .captured { animation: die-fall 0.6s forwards; pointer-events: none; }
        @keyframes die-fall { 0% { transform: translateY(0) rotate(0deg); opacity: 1; } 100% { transform: translateY(200px) rotate(45deg); opacity: 0; } }
        .rolling { animation: die-roll 0.4s infinite; }
        @keyframes die-roll { 0% { transform: rotate(0deg); } 25% { transform: rotate(10deg) scale(1.1); } 75% { transform: rotate(-10deg) scale(0.9); } 100% { transform: rotate(0deg); } }

        .die-wrapper.selected { border-color: #f1c40f; background: rgba(241, 196, 15, 0.1); transform: translateY(-8px); }
        .die-wrapper.target { border-color: #e74c3c; box-shadow: 0 0 15px #e74c3c; }
        .die-val { font-size: 1.8em; font-weight: bold; text-shadow: 2px 2px 4px black; }

        .controls { margin-top: 30px; padding: 25px; background: #222; border-radius: 15px; display: inline-block; }
        input[type="text"]#formula { background: #333; border: 1px solid #555; color: #0f0; padding: 12px; font-size: 1.2em; width: 280px; border-radius: 8px; text-align: center; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border: none; border-radius: 8px; margin: 5px; font-weight: bold; transition: 0.2s; text-transform: uppercase; }
        .btn-atk { background: #e67e22; color: white; border-bottom: 4px solid #d35400; }
        .btn-atk:active { border-bottom: 0; transform: translateY(4px); }
        .btn-pass { background: #7f8c8d; color: white; }
        .hidden { display: none !important; }

        /* Eye-Catching Victory Overlay */
        #game-over-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); backdrop-filter: blur(10px);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 1000;
        }
        .win-msg { font-size: 6em; font-weight: 900; color: #f1c40f; text-shadow: 0 0 30px #f1c40f; animation: pulse 1s infinite; margin: 0; }
        .lose-msg { font-size: 6em; font-weight: 900; color: #e74c3c; text-shadow: 0 0 30px #e74c3c; margin: 0; }
        .sub-msg { font-size: 1.5em; margin-bottom: 30px; color: #ccc; }

        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.05); } 100% { transform: scale(1); } }
        
        /* Waiting Text Animation */
        .waiting-box { margin-top: 100px; }
        .waiting-text { font-size: 2em; color: #3498db; animation: blink 1.5s infinite; font-weight: bold; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <h1>MATHS WARRIORS ONLINE</h1>
    <div id="room-tag" class="hidden">ROOM: <span id="room-id-display"></span></div>
    <div id="msg-display">Enter a room name to begin</div>

    <div id="lobby">
        <input type="text" id="room-input" class="room-input" placeholder="Room Name..."><br>
        <button class="btn-atk" onclick="joinRoom(1)" style="background:#3498db;">Host as Player 1</button>
        <button class="btn-atk" onclick="joinRoom(2)" style="background:#27ae60;">Join as Player 2</button>
    </div>

    <div id="waiting-screen" class="waiting-box hidden">
        <div class="waiting-text">WAITING FOR OPPONENT...</div>
        <p>Give your friend the room name to join the battle.</p>
    </div>

    <div id="main-game" class="hidden">
        <div class="board">
            <div id="p1-area" class="player-side">
                <h3 style="color:#3498db;">PLAYER 1</h3>
                <div id="p1-dice" class="dice-grid"></div>
            </div>
            <div id="p2-area" class="player-side">
                <h3 style="color:#27ae60;">PLAYER 2</h3>
                <div id="p2-dice" class="dice-grid"></div>
            </div>
        </div>

        <div class="controls">
            <input type="text" id="formula" placeholder="e.g. 5+2">
            <button id="mind-btn" class="btn-atk" onclick="doMind()">Mind Attack</button>
            <button id="strength-btn" class="btn-atk" onclick="doStrength()">Strength Attack</button>
            <button id="pass-btn" class="btn-pass" onclick="nextTurn()">Pass Turn</button>
            <button id="surrender-btn" class="btn-pass" style="background:#c0392b;" onclick="surrender()">Surrender</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/11.0.0/firebase-database.js";
    
        const firebaseConfig = {
            apiKey: "AIzaSyDHeIncfWQLiZb0Mu7WVB8Jj4GZniZJOg",
            authDomain: "math-warrior-7d2a7.firebaseapp.com",
            databaseURL: "https://math-warrior-7d2a7-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "math-warrior-7d2a7",
            storageBucket: "math-warrior-7d2a7.appspot.com",
            messagingSenderId: "1019102123933",
            appId: "1:1019102123933:web:a231ff25b25f8a75280174"
        };
    
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
    
        const P1_IMGS = { 4: "d4_blue.png", 6: "d6_blue.png", 8: "d8_blue.png", 10: "d10_blue.png", 12: "d12_blue.png", 20: "d20_blue.png" };
        const P2_IMGS = { 4: "d4_green.png", 6: "d6_green.png", 8: "d8_green.png", 10: "d10_green.png", 12: "d12_green.png", 20: "d20_green.png" };
    
        let p1 = { dice: [] }, p2 = { dice: [] }, turn = 1, myPlayerNum = 0, currentRoomName = "", isAnimating = false;
        let selectedOwn = [], selectedOpp = null;
    
        const setStatus = (txt) => document.getElementById('msg-display').innerText = txt;
    
        window.joinRoom = function(pNum) {
            const rName = document.getElementById('room-input').value.trim();
            if(!rName) return alert("Enter a room name!");
            
            myPlayerNum = pNum;
            currentRoomName = rName;
            const roomPath = ref(db, 'rooms/' + rName);
            const countPath = ref(db, 'rooms/' + rName + '/count');

            document.getElementById('room-id-display').innerText = rName;
            document.getElementById('room-tag').classList.remove('hidden');

            if(myPlayerNum === 1) {
                const sides = [4, 6, 8, 10, 12, 20];
                const roll = (s) => Math.floor(Math.random() * s) + 1;
                set(roomPath, {
                    p1Dice: sides.map(s => ({ s, v: roll(s) })),
                    p2Dice: sides.map(s => ({ s, v: roll(s) })),
                    turn: 1, lastCap: null, winner: null, count: 1
                });
            } else {
                update(roomPath, { count: 2 });
            }
    
            onValue(roomPath, (snap) => {
                const data = snap.val();
                if(!data) return;
    
                if(data.winner) {
                    showGameOver(data.winner);
                    return;
                }

                // Handle Waiting for Opponent
                if (!data.count || data.count < 2) {
                    document.getElementById('main-game').classList.add('hidden');
                    document.getElementById('waiting-screen').classList.remove('hidden');
                    setStatus("Waiting for opponent...");
                } else {
                    document.getElementById('waiting-screen').classList.add('hidden');
                    document.getElementById('main-game').classList.remove('hidden');
                    
                    if(data.lastCap && data.lastCap.by !== myPlayerNum && !isAnimating) {
                        showEnemyCaptureAnim(data.lastCap.targetIdx);
                    }
    
                    p1.dice = data.p1Dice || [];
                    p2.dice = data.p2Dice || [];
                    turn = data.turn;
                    if(!isAnimating) render();
                }
            });
    
            document.getElementById('lobby').classList.add('hidden');
        };
    
        function showGameOver(winnerId) {
            if (document.getElementById('game-over-overlay')) return;
            const isWin = winnerId === myPlayerNum;
            const overlay = document.createElement('div');
            overlay.id = 'game-over-overlay';
            overlay.innerHTML = `
                <h1 class="${isWin ? 'win-msg' : 'lose-msg'}">${isWin ? 'VICTORY' : 'DEFEATED'}</h1>
                <p class="sub-msg">${isWin ? 'The math gods favor you today.' : 'Your calculations were... off.'}</p>
                <button class="btn-atk" onclick="location.reload()" style="background:#fff; color:#000; font-size:1.2em; padding: 15px 40px;">NEW BATTLE</button>
            `;
            document.body.appendChild(overlay);
        }
    
        window.surrender = function() {
            if(!confirm("Surrender and return to menu?")) return;
            const oppId = myPlayerNum === 1 ? 2 : 1;
            update(ref(db, 'rooms/' + currentRoomName), { winner: oppId });
        };
    
        window.executeCapture = function() {
            isAnimating = true;
            setStatus("CAPTURE SUCCESSFUL!");
            const defSide = (myPlayerNum === 1 ? 2 : 1);
            const target = document.getElementById(`die-${defSide}-${selectedOpp}`);
            if(target) target.classList.add('captured');
    
            setTimeout(() => {
                let atk = (myPlayerNum === 1 ? p1 : p2);
                let def = (myPlayerNum === 1 ? p2 : p1);
                def.dice.splice(selectedOpp, 1);
    
                if(def.dice.length === 0) {
                    update(ref(db, 'rooms/' + currentRoomName), { winner: myPlayerNum });
                    return;
                }
    
                selectedOwn.forEach(idx => {
                    atk.dice[idx].v = Math.floor(Math.random() * atk.dice[idx].s) + 1;
                });
    
                update(ref(db, 'rooms/' + currentRoomName), {
                    p1Dice: p1.dice, p2Dice: p2.dice,
                    turn: (myPlayerNum === 1 ? 2 : 1),
                    lastCap: { by: myPlayerNum, targetIdx: selectedOpp }
                });
    
                selectedOwn = []; selectedOpp = null;
                isAnimating = false;
                render();
            }, 700);
        }
    
        function render() {
            drawDice('p1-dice', p1.dice, 1);
            drawDice('p2-dice', p2.dice, 2);
            const isMyTurn = (turn === myPlayerNum);
            document.getElementById('p1-area').className = turn === 1 ? 'player-side active' : 'player-side';
            document.getElementById('p2-area').className = turn === 2 ? 'player-side active' : 'player-side';
            setStatus(isMyTurn ? "YOUR TURN!" : "Waiting for opponent...");
            document.getElementById('mind-btn').disabled = !isMyTurn;
            document.getElementById('strength-btn').disabled = !isMyTurn;
            document.getElementById('pass-btn').disabled = !isMyTurn;
        }
    
        function drawDice(id, list, owner) {
            const container = document.getElementById(id);
            container.innerHTML = '';
            const imgSet = (owner === 1) ? P1_IMGS : P2_IMGS;
            list.forEach((d, i) => {
                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';
                wrapper.id = `die-${owner}-${i}`;
                if(owner === myPlayerNum && selectedOwn.includes(i)) wrapper.classList.add('selected');
                if(owner !== myPlayerNum && selectedOpp === i) wrapper.classList.add('target');
                wrapper.innerHTML = `<img src="${imgSet[d.s]}" class="die-img"><div class="die-val">${d.v}</div>`;
                wrapper.onclick = () => {
                    if(owner === myPlayerNum && turn === myPlayerNum) {
                        if(selectedOwn.includes(i)) selectedOwn = selectedOwn.filter(x => x !== i);
                        else selectedOwn.push(i);
                    } else if (owner !== myPlayerNum && turn === myPlayerNum) {
                        selectedOpp = i;
                    }
                    render();
                };
                container.appendChild(wrapper);
            });
        }
    
        window.doStrength = function() {
            if(selectedOwn.length !== 1 || selectedOpp === null) return setStatus("Select 1 die and 1 target!");
            let atk = (myPlayerNum === 1 ? p1 : p2).dice[selectedOwn[0]];
            let def = (myPlayerNum === 1 ? p2 : p1).dice[selectedOpp];
            if(atk.v >= def.v) executeCapture();
            else setStatus("Strength too low!");
        };
    
        window.doMind = function() {
            if(selectedOwn.length < 2 || selectedOpp === null) return setStatus("Select 2+ dice and 1 target!");
            const formula = document.getElementById('formula').value;
            const defender = (myPlayerNum === 1 ? p2 : p1);
            try {
                if(eval(formula) === defender.dice[selectedOpp].v) executeCapture();
                else setStatus("Math doesn't match!");
            } catch(e) { setStatus("Invalid Formula!"); }
        };
    
        function showEnemyCaptureAnim(idx) {
            isAnimating = true;
            const target = document.getElementById(`die-${myPlayerNum}-${idx}`);
            if(target) target.classList.add('captured');
            setTimeout(() => { isAnimating = false; render(); }, 700);
        }
    
        window.nextTurn = function() {
            if(turn !== myPlayerNum) return;
            update(ref(db, 'rooms/' + currentRoomName), { turn: (myPlayerNum === 1 ? 2 : 1), lastCap: null });
        };
    </script>
</body>
</html>
